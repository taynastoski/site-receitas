<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Receitas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    header {
      background-color: #c99fff;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      padding: 20px;
    }

    h1, h2 {
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      background-color: #c99fff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #c99fff;
    }

    .receita {
      margin-top: 20px;
      padding: 15px;
      border-left: 5px solid #c99fff;
      background: #fafafa;
    }
  </style>
</head>
<body>

<header>
  <h1>Receitas</h1>
  <p>Descubra o que cozinhar com os ingredientes que você tem!</p>
</header>

<main>
  <div class="container">
    <h2>Digite seus ingredientes</h2>
    <p>Separe os ingredientes por vírgula (ex: ovo, leite, farinha)</p>
    
    <input type="text" id="ingredientesInput" placeholder="Digite aqui...">
    <br>
    <button onclick="buscarReceitas()">Buscar receitas</button>

    <div id="resultado"></div>
  </div>
</main>

<script>
  const receitas = [
    {
      nome: "Bolo Simples",
      ingredientes: ["ovo", "leite", "farinha", "açúcar"],
      preparo: [
        "Misture todos os ingredientes",
        "Despeje em uma forma",
        "Asse por 40 minutos a 180°C"
      ]
    },
    {
      nome: "Panqueca",
      ingredientes: ["ovo", "leite", "farinha"],
      preparo: [
        "Misture os ingredientes",
        "Despeje na frigideira",
        "Doure dos dois lados"
      ]
    },
    {
      nome: "Omelete",
      ingredientes: ["ovo", "sal"],
      preparo: [
        "Bata os ovos",
        "Adicione sal",
        "Cozinhe na frigideira"
      ]
    }
  ];

  function buscarReceitas() {
    const input = document.getElementById("ingredientesInput").value.toLowerCase();
    const ingredientesUsuario = input.split(",").map(i => i.trim());

    const resultadoDiv = document.getElementById("resultado");
    resultadoDiv.innerHTML = "";

    const receitasPossiveis = receitas.filter(receita =>
      receita.ingredientes.every(ing => ingredientesUsuario.includes(ing))
    );

    if (receitasPossiveis.length === 0) {
      resultadoDiv.innerHTML = "<p>Nenhuma receita encontrada 😢</p>";
      return;
    }

    receitasPossiveis.forEach(receita => {
      const div = document.createElement("div");
      div.className = "receita";

      let html = `<h3>${receita.nome}</h3>`;

      html += "<strong>Ingredientes:</strong><ul>";
      receita.ingredientes.forEach(ing => {
        html += `<li>${ing}</li>`;
      });
      html += "</ul>";

      html += "<strong>Modo de preparo:</strong><ol>";
      receita.preparo.forEach(passo => {
        html += `<li>${passo}</li>`;
      });
      html += "</ol>";

      div.innerHTML = html;
      resultadoDiv.appendChild(div);
    });
  }
</script>

</body>
</html>
